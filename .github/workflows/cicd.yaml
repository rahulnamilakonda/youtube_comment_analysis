name: youtube_comment_analysis

on:
  push:
    branches: [ master, main ]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    env:
      # These env variables are required for DVC, Model Registry, and API tests
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      YOUTUBE_DATA_API: ${{ secrets.YOUTUBE_DATA_API}}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          # Industrial Practice: fetch-depth: 0 ensures full Git history is available.
          # This is crucial for DVC to track versions and for Git-based versioning tools.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          # Industrial Practice: Caching dependencies.
          # This saves time on every run by reusing previously downloaded pip packages
          # unless requirements.txt or pyproject.toml changes.
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Setup DVC
        run: |
          pip install dvc
          # 1. Force add the remote to handle existing configs
          dvc remote add origin https://dagshub.com/${{ env.DAGSHUB_USERNAME }}/youtube_comment_analysis.dvc --force
          # 2. Explicitly set origin as the default remote
          dvc remote default origin
          # 3. Configure authentication
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ env.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ env.DAGSHUB_TOKEN }}

      - name: DVC Pull Data
        run: dvc pull

      - name: Execute ML Pipeline & Technical Tests
        # Without -f dvc repro <stage> runs all previous stages in the graph:
        # Industrial Practice: Adding the '-f' (force) flag.
        # This overrides DVC's lazy-loading and forces every stage to run from scratch:
        # data_collection -> preprocessing -> features -> train -> evaluate -> validate_schema
        # This ensures we stop immediately if the technical blueprint (schema) is wrong.

        run: dvc repro validate_schema

      - name: Model Performance Gate & Promotion
        # Industrial Practice: DVC detects that previous stages are already cached/run.
        # This only executes the performance threshold logic and promotes to PRODUCTION.
        # We use -f here as well to ensure the promotion logic is explicitly executed
        if: success()
        run: dvc repro validate_model

      - name: API Integration Gate
        # Finally, verify that the API endpoints are still compatible
        if: success()
        run: dvc repro validate_api

      - name: Save Pipeline State
        # Push updated model artifacts back to Dagshub storage
        if: success()
        run: dvc push

      - name: Commit and Push DVC Metadata
        # Industrial Practice: Precisely target dvc.lock and ignore other changes.
        # [skip ci] is CRITICAL: It prevents an infinite loop by telling GitHub 
        # not to trigger a new workflow run for this bot-generated commit.
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          # Check if dvc.lock specifically has changes to avoid "nothing to commit" errors
          if git diff --name-only | grep -q "dvc.lock"; then
            git add dvc.lock
            git commit -m "chore: update dvc.lock [skip ci]"
            git push
          else
            echo "No changes in dvc.lock, skipping commit."
          fi

  docker-delivery:
    # Industrial Practice: Gating the Deployment.
    needs: mlops-pipeline
    if: success()
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      YOUTUBE_DATA_API: ${{ secrets.YOUTUBE_DATA_API}}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup DVC and Pull Artifacts
        # Industrial Practice: We run a simple 'dvc pull'. 
        # DVC will automatically read dvc.lock and pull only the necessary 
        # model and data files into this runner.
        run: |
          pip install dvc
          dvc remote add origin https://dagshub.com/${{ env.DAGSHUB_USERNAME }}/youtube_comment_analysis.dvc --force
          dvc remote default origin
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ env.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ env.DAGSHUB_TOKEN }}
          dvc pull

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Industrial Practice: Immutable vs Mutable tagging.
          # 'latest' is mutable (always newest).
          # 'github.sha' is immutable (unique link to code history/audit).
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube_comment_analysis:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube_comment_analysis:${{ github.sha }}

  continuous-deployment:
    needs: docker-delivery
    if: success()
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      YOUTUBE_DATA_API: ${{ secrets.YOUTUBE_DATA_API}}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "imageUrl": "${{ secrets.DOCKERHUB_USERNAME }}/youtube_comment_analysis:latest"
            }'
          echo "Deploy triggered on Render"
